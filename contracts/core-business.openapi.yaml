openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Smart Campus Core Business Policy API
  version: 1.0.0
  summary: Realtime access-policy evaluation for the Smart Campus platform.
  description: |
    Contract negotiated between Access Gate (consumer) and Core Business
    (provider). The API evaluates access requests, manages policies, and
    exposes decisions and alerts for audit.
  contact:
    name: Core Business Team 6A
    email: trongnamm2k5@gmail.com
  license:
    name: MIT
    identifier: MIT
servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: http://localhost:8000
    description: Local Core Business service
tags:
  - name: Health
    description: Service liveness and version.
  - name: Policies
    description: Policy creation, lookup, and evaluation.
  - name: Decisions
    description: Immutable policy-decision audit records.
  - name: Alerts
    description: Alerts generated by policy decisions.
  - name: Integration
    description: Stable Buoi 6 endpoints used by IoT, Vision, and Access Gate teams.
paths:
  /health:
    get:
      tags: [Health]
      summary: Check service health
      description: Public liveness endpoint used by Docker and orchestration.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
              examples:
                healthy:
                  value:
                    status: ok
                    service: core-business
                    version: 1.0.0
                    policyStore: ready
  /partners/health:
    get:
      tags: [Health]
      summary: Check partner integration health
      description: Returns ok=false instead of hanging when Notification, Analytics, or MQTT is unavailable.
      operationId: getPartnersHealth
      security: []
      responses:
        "200":
          description: Partner health snapshot.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /mqtt/status:
    get:
      tags: [Integration]
      summary: Check MQTT subscriber status
      description: Shows MQTT topic, QoS, broker target, connection state, and number of received messages.
      operationId: getMqttStatus
      security: []
      responses:
        "200":
          description: MQTT subscriber status.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /mqtt/events:
    get:
      tags: [Integration]
      summary: List MQTT sensor events received by Core
      description: Evidence endpoint for team-iot MQTT publish integration.
      operationId: listMqttEvents
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Recent MQTT events.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [Integration]
      summary: Clear MQTT sensor event evidence
      description: Clears local MQTT evidence before an automated smoke test.
      operationId: clearMqttEvents
      responses:
        "200":
          description: Event evidence cleared.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/access-events:
    post:
      tags: [Integration]
      summary: Process an Access Gate event
      description: Evaluates realtime access and forwards the result to Analytics and Notification when required.
      operationId: ingestAccessEvent
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessEvaluationRequest"
      responses:
        "200":
          description: Access event processed synchronously.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/access-gate/log-query:
    post:
      tags: [Integration]
      summary: Query Access Gate logs through Core
      description: Core forwards this request to the configured Access Gate provider for log or permission evidence. The provider method and path are configured by ACCESS_GATE_METHOD and ACCESS_GATE_PATH.
      operationId: queryAccessGateLogs
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessGateLogQuery"
      responses:
        "200":
          description: Access Gate provider response returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/sensor-events:
    post:
      tags: [Integration]
      summary: Process an IoT sensor event
      description: Applies sensor policy and forwards the normalized result to partner services.
      operationId: ingestSensorEvent
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SensorEvaluationRequest"
      responses:
        "202":
          description: Sensor event accepted and processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/detections:
    post:
      tags: [Integration]
      summary: Process an AI Vision detection
      description: Applies detection policy and forwards security outcomes to partner services.
      operationId: ingestDetection
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectionEvaluationRequest"
      responses:
        "202":
          description: Detection accepted and processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/vision-results:
    post:
      tags: [Integration]
      summary: Process an AI Vision result
      description: Accepts the snake_case result payload emitted by team-vision and maps it to Core detection policy.
      operationId: ingestVisionResult
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisionResultRequest"
      responses:
        "202":
          description: Vision result accepted and processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /policies/evaluate-access:
    post:
      tags: [Policies]
      summary: Evaluate a realtime access request
      description: |
        Evaluates an Access Gate request against the active policy. Access Gate
        must fail closed when this operation times out or returns a 5xx response.
      operationId: evaluateAccessPolicy
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessEvaluationRequest"
            examples:
              employeeEntry:
                value:
                  requestId: 1b8a6f7f-f27e-4b98-b884-22fb705ec587
                  cardId: CARD-000123
                  gateId: GATE-A1
                  direction: ENTRY
                  occurredAt: "2026-05-19T08:15:00Z"
                  subject:
                    subjectId: EMP-0007
                    role: STAFF
                    cardStatus: ACTIVE
                    zone: ADMIN
      responses:
        "200":
          description: Policy decision returned.
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessDecision"
              examples:
                allowed:
                  value:
                    decisionId: c439b6fe-7144-47aa-ab60-65d17ebedb78
                    requestId: 1b8a6f7f-f27e-4b98-b884-22fb705ec587
                    decision: ALLOW
                    reasonCode: POLICY_ALLOW
                    policyId: 7e34be8b-1da8-483e-b5ae-28f8662d0ac7
                    evaluatedAt: "2026-05-19T08:15:00Z"
                    expiresAt: "2026-05-19T08:15:30Z"
                    correlationId: 80cddcc0-72e8-41da-8425-22a263f11254
                    explanation: Active staff card is allowed in ADMIN zone.
                denied:
                  value:
                    decisionId: 4e7c8a4d-b530-4b2b-8f7f-e34ab3c94fa4
                    requestId: 1b8a6f7f-f27e-4b98-b884-22fb705ec587
                    decision: DENY
                    reasonCode: POLICY_DENY_REVOKED
                    policyId: 7e34be8b-1da8-483e-b5ae-28f8662d0ac7
                    evaluatedAt: "2026-05-19T08:15:00Z"
                    expiresAt: "2026-05-19T08:15:30Z"
                    correlationId: 80cddcc0-72e8-41da-8425-22a263f11254
                    explanation: Card status is REVOKED.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /policies/evaluate-sensor:
    post:
      tags: [Policies]
      summary: Evaluate a sensor reading
      description: Applies threshold policy to IoT telemetry and may create an alert.
      operationId: evaluateSensorPolicy
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SensorEvaluationRequest"
            examples:
              highTemperature:
                value:
                  requestId: c95458d1-aa71-444f-82ad-a9d45337c12b
                  deviceId: SENSOR-A101
                  metric: TEMPERATURE
                  value: 42.5
                  unit: CELSIUS
                  occurredAt: "2026-05-19T08:20:00Z"
      responses:
        "200":
          description: Sensor policy outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorDecision"
              examples:
                warning:
                  value:
                    decisionId: bb8c175d-5a5a-42ea-a29a-f7639130f69b
                    requestId: c95458d1-aa71-444f-82ad-a9d45337c12b
                    outcome: ALERT
                    reasonCode: SENSOR_THRESHOLD_CRITICAL
                    policyId: 98ae19f6-13f6-4cc5-aa8f-3b76cb8c68ec
                    alertId: 6644f568-85df-4913-b959-50df1616d58b
                    evaluatedAt: "2026-05-19T08:20:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /policies/evaluate-detection:
    post:
      tags: [Policies]
      summary: Evaluate an AI Vision detection
      description: Applies security policy to a normalized AI Vision result.
      operationId: evaluateDetectionPolicy
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectionEvaluationRequest"
            examples:
              unknownPerson:
                value:
                  requestId: 8cc9bb0d-ee85-41e5-a3fa-f4155c7286d8
                  detectionId: 4ec96900-37e0-47eb-9021-b95885c089d8
                  cameraId: CAMERA-LOBBY-01
                  label: UNKNOWN_PERSON
                  confidence: 0.96
                  occurredAt: "2026-05-19T08:21:00Z"
      responses:
        "200":
          description: Detection policy outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionDecision"
              examples:
                review:
                  value:
                    decisionId: fa4ee2a2-58e8-4d2c-b41c-811013b8af56
                    requestId: 8cc9bb0d-ee85-41e5-a3fa-f4155c7286d8
                    outcome: ALERT
                    reasonCode: UNKNOWN_PERSON_HIGH_CONFIDENCE
                    policyId: 26a2f3c5-32ce-4c1d-b66e-d3e6a900989e
                    alertId: 289ef942-bd64-4e95-8645-87a30aa54505
                    evaluatedAt: "2026-05-19T08:21:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /policies:
    post:
      tags: [Policies]
      summary: Create an access policy
      description: Creates a versioned policy used by the evaluation endpoint.
      operationId: createPolicy
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyCreateRequest"
            examples:
              staffPolicy:
                value:
                  name: Staff office-hours access
                  description: Allow active staff cards during office hours.
                  priority: 100
                  active: true
                  rules:
                    - ruleType: ROLE
                      allowedRoles: [STAFF, SECURITY]
                    - ruleType: TIME_WINDOW
                      timezone: Asia/Ho_Chi_Minh
                      start: "06:00"
                      end: "22:00"
      responses:
        "201":
          description: Policy created.
          headers:
            Location:
              description: URI of the newly created policy.
              schema:
                type: string
                format: uri-reference
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessPolicy"
              examples:
                created:
                  value:
                    policyId: 7e34be8b-1da8-483e-b5ae-28f8662d0ac7
                    name: Staff office-hours access
                    description: Allow active staff cards during office hours.
                    priority: 100
                    active: true
                    version: 1
                    createdAt: "2026-05-19T08:00:00Z"
                    rules:
                      - ruleType: ROLE
                        allowedRoles: [STAFF, SECURITY]
                      - ruleType: TIME_WINDOW
                        timezone: Asia/Ho_Chi_Minh
                        start: "06:00"
                        end: "22:00"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [Policies]
      summary: List access policies
      description: Returns policies ordered by priority and creation time.
      operationId: listPolicies
      parameters:
        - name: active
          in: query
          required: false
          schema:
            type: boolean
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Policy page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /policies/{policyId}:
    get:
      tags: [Policies]
      summary: Get an access policy
      description: Returns one policy including its polymorphic rule set.
      operationId: getPolicy
      parameters:
        - $ref: "#/components/parameters/PolicyId"
      responses:
        "200":
          description: Policy found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessPolicy"
              examples:
                staffPolicy:
                  value:
                    policyId: 7e34be8b-1da8-483e-b5ae-28f8662d0ac7
                    name: Staff office-hours access
                    description: Allow active staff cards during office hours.
                    priority: 100
                    active: true
                    version: 1
                    createdAt: "2026-05-19T08:00:00Z"
                    rules:
                      - ruleType: ROLE
                        allowedRoles: [STAFF, SECURITY]
                      - ruleType: TIME_WINDOW
                        timezone: Asia/Ho_Chi_Minh
                        start: "06:00"
                        end: "22:00"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /decisions/{decisionId}:
    get:
      tags: [Decisions]
      summary: Get a policy decision
      description: Retrieves an immutable decision for incident investigation.
      operationId: getDecision
      parameters:
        - $ref: "#/components/parameters/DecisionId"
      responses:
        "200":
          description: Decision found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessDecision"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /alerts:
    get:
      tags: [Alerts]
      summary: List policy alerts
      description: Lists alerts generated from denied or suspicious access requests.
      operationId: listAlerts
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [OPEN, ACKNOWLEDGED, RESOLVED]
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Alert page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertList"
              examples:
                oneOpenAlert:
                  value:
                    items:
                      - alertId: 6644f568-85df-4913-b959-50df1616d58b
                        decisionId: 4e7c8a4d-b530-4b2b-8f7f-e34ab3c94fa4
                        severity: HIGH
                        status: OPEN
                        message: Revoked card attempted entry at GATE-A1.
                        createdAt: "2026-05-19T08:15:00Z"
                    count: 1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PolicyId:
      name: policyId
      in: path
      required: true
      description: Policy UUID.
      schema:
        type: string
        format: uuid
    DecisionId:
      name: decisionId
      in: path
      required: true
      description: Decision UUID.
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Unique key reused only when retrying the same request.
      schema:
        type: string
        minLength: 8
        maxLength: 128
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: Cross-service trace identifier.
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  headers:
    CorrelationId:
      description: Correlation identifier assigned to the request.
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Request syntax or JSON shape is invalid.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            invalidJson:
              value:
                type: https://smart-campus.example/problems/invalid-request
                title: Invalid request
                status: 400
                detail: Request body is not valid JSON.
                instance: /policies/evaluate-access
                traceId: 80cddcc0-72e8-41da-8425-22a263f11254
    Unauthorized:
      description: Bearer token is missing or invalid.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            missingToken:
              value:
                type: https://smart-campus.example/problems/unauthorized
                title: Unauthorized
                status: 401
                detail: A valid bearer token is required.
                instance: /policies/evaluate-access
                traceId: 80cddcc0-72e8-41da-8425-22a263f11254
    Forbidden:
      description: Caller is authenticated but lacks permission.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Requested policy, decision, or alert does not exist.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            missingResource:
              value:
                type: https://smart-campus.example/problems/not-found
                title: Resource not found
                status: 404
                detail: The requested resource does not exist.
                instance: /policies/00000000-0000-4000-8000-000000000000
                traceId: 80cddcc0-72e8-41da-8425-22a263f11254
    Conflict:
      description: Idempotency key or policy name conflicts with existing data.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    UnprocessableEntity:
      description: JSON is valid but violates a business rule.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    InternalServerError:
      description: Unexpected policy engine failure.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ServiceUnavailable:
      description: Notification or Analytics is unavailable or exceeded the configured timeout.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, service, version, policyStore]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
          const: core-business
        version:
          type: string
          pattern: "^\\d+\\.\\d+\\.\\d+$"
        policyStore:
          type: string
          enum: [ready, degraded]
    AccessEvaluationRequest:
      type: object
      additionalProperties: false
      required: [requestId, cardId, gateId, direction, occurredAt, subject]
      properties:
        requestId:
          type: string
          format: uuid
        cardId:
          type: string
          pattern: "^CARD-[A-Z0-9]{6,20}$"
        gateId:
          type: string
          pattern: "^GATE-[A-Z0-9-]{2,20}$"
        direction:
          type: string
          enum: [ENTRY, EXIT]
        occurredAt:
          type: string
          format: date-time
        subject:
          $ref: "#/components/schemas/AccessSubject"
    AccessSubject:
      type: object
      additionalProperties: false
      required: [subjectId, role, cardStatus, zone]
      properties:
        subjectId:
          type: string
          minLength: 3
          maxLength: 64
        role:
          type: string
          enum: [STUDENT, STAFF, SECURITY, VISITOR]
        cardStatus:
          type: string
          enum: [ACTIVE, EXPIRED, REVOKED, SUSPENDED]
        zone:
          type: string
          minLength: 2
          maxLength: 32
    AccessGateLogQuery:
      type: object
      additionalProperties: false
      required: [requestId, cardId, gateId, direction, from, to]
      properties:
        requestId:
          type: string
          format: uuid
        cardId:
          type: string
          pattern: "^CARD-[A-Z0-9]{6,20}$"
        gateId:
          type: string
          pattern: "^GATE-[A-Z0-9-]{2,20}$"
        direction:
          type: string
          enum: [ENTRY, EXIT]
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
    SensorEvaluationRequest:
      type: object
      additionalProperties: false
      required: [requestId, deviceId, metric, value, unit, occurredAt]
      properties:
        requestId:
          type: string
          format: uuid
        deviceId:
          type: string
          pattern: "^SENSOR-[A-Z0-9-]{2,24}$"
        metric:
          type: string
          enum: [TEMPERATURE, HUMIDITY, SMOKE, CO2]
        value:
          type: number
          minimum: -100
          maximum: 10000
        unit:
          type: string
          enum: [CELSIUS, PERCENT, PPM, BOOLEAN]
        occurredAt:
          type: string
          format: date-time
    SensorDecision:
      type: object
      additionalProperties: false
      required: [decisionId, requestId, outcome, reasonCode, policyId, alertId, evaluatedAt]
      properties:
        decisionId:
          type: string
          format: uuid
        requestId:
          type: string
          format: uuid
        outcome:
          type: string
          enum: [NORMAL, WARNING, ALERT]
        reasonCode:
          type: string
          enum: [SENSOR_NORMAL, SENSOR_THRESHOLD_WARNING, SENSOR_THRESHOLD_CRITICAL]
        policyId:
          type: string
          format: uuid
        alertId:
          type:
            - string
            - "null"
          format: uuid
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        alertSuppressed:
          type: boolean
        evaluatedAt:
          type: string
          format: date-time
    DetectionEvaluationRequest:
      type: object
      additionalProperties: false
      required: [requestId, detectionId, cameraId, label, confidence, occurredAt]
      properties:
        requestId:
          type: string
          format: uuid
        detectionId:
          type: string
          format: uuid
        cameraId:
          type: string
          pattern: "^CAMERA-[A-Z0-9-]{2,24}$"
        label:
          type: string
          enum: [AUTHORIZED_PERSON, UNKNOWN_PERSON, CROWD, FIRE, SMOKE]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        occurredAt:
          type: string
          format: date-time
        location:
          type:
            - string
            - "null"
          minLength: 1
          maxLength: 128
    VisionResultRequest:
      type: object
      additionalProperties: false
      required: [request_id, camera_id, location, analysis, labels, summary]
      properties:
        request_id:
          type: string
          minLength: 3
          maxLength: 128
        camera_id:
          type: string
          minLength: 2
          maxLength: 64
        location:
          type: string
          minLength: 1
          maxLength: 128
        analysis:
          type: object
          additionalProperties: true
        labels:
          type: array
          items:
            oneOf:
              - type: string
              - type: object
                additionalProperties: true
        risk_level:
          type: string
          default: medium
          minLength: 2
          maxLength: 32
        summary:
          type: string
          minLength: 1
          maxLength: 500
    DetectionDecision:
      type: object
      additionalProperties: false
      required: [decisionId, requestId, outcome, reasonCode, policyId, alertId, evaluatedAt]
      properties:
        decisionId:
          type: string
          format: uuid
        requestId:
          type: string
          format: uuid
        outcome:
          type: string
          enum: [IGNORE, REVIEW, ALERT]
        reasonCode:
          type: string
          enum:
            - AUTHORIZED_PERSON
            - LOW_CONFIDENCE
            - UNKNOWN_PERSON_HIGH_CONFIDENCE
            - INTRUSION_CORRELATED
            - CROWD_DETECTED
            - HAZARD_DETECTED
        policyId:
          type: string
          format: uuid
        alertId:
          type:
            - string
            - "null"
          format: uuid
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        alertSuppressed:
          type: boolean
        correlatedEvidenceEventIds:
          type: array
          items:
            type: string
        evaluatedAt:
          type: string
          format: date-time
    AccessDecision:
      type: object
      additionalProperties: false
      required:
        - decisionId
        - requestId
        - decision
        - reasonCode
        - policyId
        - evaluatedAt
        - expiresAt
        - correlationId
        - explanation
      properties:
        decisionId:
          type: string
          format: uuid
        requestId:
          type: string
          format: uuid
        decision:
          type: string
          enum: [ALLOW, DENY]
        reasonCode:
          type: string
          enum:
            - POLICY_ALLOW
            - POLICY_DENY_EXPIRED_CARD
            - POLICY_DENY_REVOKED
            - POLICY_DENY_SUSPENDED
            - POLICY_DENY_ROLE
            - POLICY_DENY_TIME_WINDOW
            - POLICY_DENY_OUTSIDE_ALLOWED_HOURS
            - POLICY_DENY_ZONE
            - POLICY_NOT_FOUND
            - REPEATED_ACCESS_DENIED
        policyId:
          type: string
          format: uuid
        evaluatedAt:
          type: string
          format: date-time
        expiresAt:
          type: [string, "null"]
          format: date-time
        correlationId:
          type: string
          format: uuid
        explanation:
          type: string
          minLength: 3
          maxLength: 300
        alertId:
          type:
            - string
            - "null"
          format: uuid
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        deniedAttemptsInWindow:
          type: integer
          minimum: 0
        underlyingReasonCode:
          type: string
        alertSuppressed:
          type: boolean
    PolicyCreateRequest:
      type: object
      additionalProperties: false
      required: [name, priority, active, rules]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: [string, "null"]
          maxLength: 500
        priority:
          type: integer
          minimum: 1
          maximum: 1000
        active:
          type: boolean
        rules:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: "#/components/schemas/PolicyRule"
    AccessPolicy:
      type: object
      additionalProperties: false
      required: [policyId, name, description, priority, active, rules, version, createdAt]
      properties:
        policyId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type:
            - string
            - "null"
          maxLength: 500
        priority:
          type: integer
          minimum: 1
          maximum: 1000
        active:
          type: boolean
        rules:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: "#/components/schemas/PolicyRule"
        version:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
    PolicyRule:
      oneOf:
        - $ref: "#/components/schemas/RoleRule"
        - $ref: "#/components/schemas/TimeWindowRule"
        - $ref: "#/components/schemas/ZoneRule"
      discriminator:
        propertyName: ruleType
        mapping:
          ROLE: "#/components/schemas/RoleRule"
          TIME_WINDOW: "#/components/schemas/TimeWindowRule"
          ZONE: "#/components/schemas/ZoneRule"
    RoleRule:
      type: object
      additionalProperties: false
      required: [ruleType, allowedRoles]
      properties:
        ruleType:
          type: string
          const: ROLE
        allowedRoles:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [STUDENT, STAFF, SECURITY, VISITOR]
    TimeWindowRule:
      type: object
      additionalProperties: false
      required: [ruleType, timezone, start, end]
      properties:
        ruleType:
          type: string
          const: TIME_WINDOW
        timezone:
          type: string
          minLength: 3
          maxLength: 64
        start:
          type: string
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
        end:
          type: string
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
    ZoneRule:
      type: object
      additionalProperties: false
      required: [ruleType, allowedZones]
      properties:
        ruleType:
          type: string
          const: ZONE
        allowedZones:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            minLength: 2
            maxLength: 32
    PolicyList:
      type: object
      additionalProperties: false
      required: [items, count]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AccessPolicy"
        count:
          type: integer
          minimum: 0
    Alert:
      type: object
      additionalProperties: false
      required: [alertId, decisionId, severity, status, message, createdAt]
      properties:
        alertId:
          type: string
          format: uuid
        decisionId:
          type: string
          format: uuid
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        status:
          type: string
          enum: [OPEN, ACKNOWLEDGED, RESOLVED]
        message:
          type: string
          minLength: 3
          maxLength: 300
        createdAt:
          type: string
          format: date-time
    AlertList:
      type: object
      additionalProperties: false
      required: [items, count]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
        count:
          type: integer
          minimum: 0
    IntegrationDelivery:
      type: object
      additionalProperties: true
      required: [provider, status]
      properties:
        provider:
          type: string
          enum: [analytics, notification]
        status:
          type: string
          enum: [accepted, skipped]
        statusCode:
          type: integer
          minimum: 100
          maximum: 599
        providerResponse:
          type: object
          additionalProperties: true
    IntegrationResponse:
      type: object
      additionalProperties: false
      required: [eventType, status, correlationId, result, deliveries]
      properties:
        eventType:
          type: string
          enum: [access-event, sensor-event, detection]
        status:
          type: string
          const: processed
        correlationId:
          type: string
          format: uuid
        result:
          type: object
          additionalProperties: true
        deliveries:
          type: object
          additionalProperties: false
          required: [analytics, notification]
          properties:
            analytics:
              $ref: "#/components/schemas/IntegrationDelivery"
            notification:
              $ref: "#/components/schemas/IntegrationDelivery"
    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status, detail, instance, traceId]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
          minLength: 3
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
          minLength: 3
        instance:
          type: string
          format: uri-reference
        traceId:
          type: string
          format: uuid
security:
  - bearerAuth: []
