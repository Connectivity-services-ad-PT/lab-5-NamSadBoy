services:
  api:
    image: fit4110/core-business:v0.1.0-team-core
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-core-api-lab05
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      AUDIT_SERVICE_URL: http://audit-service:9000
    depends_on:
      db:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      partner-service:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    networks:
      - team-internal
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: fit4110-mqtt-broker-lab06
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "${MQTT_LOCAL_PORT:-1883}:1883"
    networks:
      - team-internal
    healthcheck:
      test:
        - CMD-SHELL
        - mosquitto_pub -h 127.0.0.1 -p 1883 -t smart-campus/health -m ok -q 1
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  partner-service:
    image: fit4110/partner-mock:v0.1.0-team-core
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-partner-mock-lab06
    command:
      - uvicorn
      - partner_service.main:app
      - --app-dir
      - src
      - --host
      - 0.0.0.0
      - --port
      - "9100"
    environment:
      SERVICE_VERSION: ${SERVICE_VERSION}
    ports:
      - "${PARTNER_MOCK_PORT:-9100}:9100"
    networks:
      - team-internal
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:9100/health', timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  audit-service:
    image: fit4110/core-audit:v0.1.0-team-core
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-core-audit-lab05
    command:
      - uvicorn
      - audit_service.main:app
      - --app-dir
      - src
      - --host
      - 0.0.0.0
      - --port
      - "9000"
    environment:
      SERVICE_VERSION: ${SERVICE_VERSION}
    ports:
      - "${AUDIT_PORT:-9000}:9000"
    networks:
      - team-internal
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - core-db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

networks:
  team-internal:
    name: team-core-internal
    driver: bridge

volumes:
  core-db-data:
