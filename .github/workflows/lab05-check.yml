name: Lab 05 and Buoi 06 Integration Check

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  compose-check:
    name: Validate Core Integration Stack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Create .env from example
        run: cp .env.example .env

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Build and start Compose stack
        run: docker compose up -d --build --wait

      - name: Show running containers
        run: docker compose ps

      - name: Test Core API health
        run: curl -fsS http://localhost:8000/health

      - name: Test audit service health
        run: curl -fsS http://localhost:9000/health

      - name: Test partner mock health
        run: curl -fsS http://localhost:9100/health

      - name: Test local MQTT broker
        run: docker compose exec -T mqtt-broker mosquitto_pub -h 127.0.0.1 -p 1883 -t smart-campus/health -m ok -q 1

      - name: Test Core business rules
        run: docker compose run --rm --no-deps -v "$PWD/tests:/app/tests:ro" api python -m unittest discover -s tests -v

      - name: Test database readiness
        run: |
          set -a
          source .env
          set +a
          docker compose exec -T db pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"

      - name: Run Lab 05 and Buoi 06 Newman suites
        run: npm run test:all

      - name: Publish versioned images to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag fit4110/core-business:v0.1.0-team-core ghcr.io/connectivity-services-ad-pt/core-business-compose:v0.1.0-team-core
          docker tag fit4110/core-audit:v0.1.0-team-core ghcr.io/connectivity-services-ad-pt/core-audit:v0.1.0-team-core
          docker push ghcr.io/connectivity-services-ad-pt/core-business-compose:v0.1.0-team-core
          docker push ghcr.io/connectivity-services-ad-pt/core-audit:v0.1.0-team-core

      - name: Verify readiness checklist
        run: |
          CHECKLIST="checklists/readiness-checklist.md"
          test -f "$CHECKLIST"
          CHECKED=$(grep -cE '^[[:space:]]*-[[:space:]]*\[[xX]\]' "$CHECKLIST" || true)
          echo "Readiness checklist: ${CHECKED:-0} checked items"
          test "${CHECKED:-0}" -ge 10

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-integration-reports
          path: reports/
          if-no-files-found: warn

      - name: Dump Compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down Compose stack
        if: always()
        run: docker compose down -v
